<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... — Moonstone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Quattrocento+Sans:wght@400;700&family=Satisfy&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --sand: #E8DFD0;
  --sage: #9CAF93;
  --sage-deep: #6B8F60;
  --lavender: #B8A9C9;
  --lavender-light: #D4C8E2;
  --moonlight: #E8E0F0;
  --rose-mist: #D4B5B0;
  --dusk: #2C2437;
  --twilight: #4A3F5C;
  --warm-white: #FDFBF7;
  --gold-soft: #C9A96E;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Quattrocento Sans', sans-serif;
  background: var(--cream);
  color: var(--dusk);
  line-height: 1.7;
  min-height: 100vh;
  transition: background-color 0.6s ease;
}

h1, h2, h3, h4 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  line-height: 1.2;
}

a { text-decoration: none; color: inherit; transition: all 0.4s ease; }

/* ─── Nav ─── */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  padding: 1.2rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(253, 251, 247, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(232, 223, 208, 0.4);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--dusk);
}

.nav-back {
  font-size: 0.85rem;
  color: var(--twilight);
  letter-spacing: 0.05em;
  transition: color 0.3s;
}

.nav-back:hover { color: var(--lavender); }

/* ─── Product Layout ─── */
.product-page {
  padding: 8rem 2rem 4rem;
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
  min-height: 100vh;
}

/* ─── Image Side ─── */
.product-image-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.product-image-glow {
  position: absolute;
  width: 85%;
  height: 85%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
  filter: blur(40px);
  pointer-events: none;
}

.product-image {
  width: 100%;
  max-width: 520px;
  object-fit: contain;
  position: relative;
  z-index: 1;
  animation: floatIn 0.8s ease-out both;
}

@keyframes floatIn {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── Info Side ─── */
.product-info {
  animation: slideIn 0.8s ease-out 0.15s both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

.product-info .script {
  font-family: 'Satisfy', cursive;
  font-size: 1.1rem;
  color: var(--sage-deep);
  display: block;
  margin-bottom: 0.6rem;
}

.product-info h1 {
  font-size: clamp(2.5rem, 5vw, 3.8rem);
  color: var(--dusk);
  letter-spacing: 0.03em;
  margin-bottom: 1.5rem;
}

.product-price-tag {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--dusk);
  margin-bottom: 2rem;
  padding: 0.5rem 1.5rem;
  background: rgba(255,255,255,0.5);
  border-radius: 50px;
  border: 1px solid rgba(232, 223, 208, 0.6);
}

.product-description {
  font-size: 1.05rem;
  color: var(--twilight);
  line-height: 1.9;
  margin-bottom: 2.5rem;
  max-width: 480px;
}

.product-details-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 2.5rem;
}

.product-detail-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.95rem;
  color: var(--twilight);
}

.product-detail-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.8rem 2rem;
  background: var(--dusk);
  color: var(--warm-white);
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.9rem;
  letter-spacing: 0.05em;
  transition: all 0.3s;
}

.back-btn:hover {
  background: var(--twilight);
  transform: translateY(-2px);
}

/* ─── Loading State ─── */
.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem;
}

.loading-state p {
  font-family: 'Satisfy', cursive;
  font-size: 1.3rem;
  color: var(--twilight);
  opacity: 0.6;
}

/* ─── Footer ─── */
.product-footer {
  text-align: center;
  padding: 3rem 2rem;
  background: var(--dusk);
  color: rgba(255, 255, 255, 0.5);
  font-size: 0.85rem;
}

.product-footer a {
  color: var(--lavender-light);
  transition: opacity 0.3s;
}

.product-footer a:hover { opacity: 0.7; }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .product-page {
    grid-template-columns: 1fr;
    gap: 2.5rem;
    padding: 7rem 1.5rem 3rem;
  }

  .product-image { max-width: 100%; }

  .product-info h1 { font-size: 2.2rem; }
}
</style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav class="nav">
  <a href="/" class="nav-logo">MOONSTONE</a>
  <a href="/#crystals" class="nav-back">Back to Collection</a>
</nav>

<!-- ─── PRODUCT CONTENT ─── -->
<section class="product-page" id="productPage">
  <div class="loading-state">
    <p>Loading crystal...</p>
  </div>
</section>

<!-- ─── FOOTER ─── -->
<footer class="product-footer">
  <p>&copy; 2026 Moonstone. All rights reserved.</p>
  <p style="margin-top:0.5rem;"><a href="/">Back to Home</a></p>
</footer>

<script type="module">
import { db } from "/js/firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const page = document.getElementById('productPage');

  if (!id) {
    page.innerHTML = '<div class="loading-state"><p>Product not found</p></div>';
    return;
  }

  try {
    const snap = await getDoc(doc(db, "products", id));

    if (!snap.exists()) {
      page.innerHTML = '<div class="loading-state"><p>Product not found</p></div>';
      return;
    }

    const p = snap.data();

    // Set page title
    document.title = `${p.name} — Moonstone`;

    // Set background color
    if (p.bgColor) {
      document.body.style.backgroundColor = p.bgColor;
    }

    // Split description into paragraphs if it has newlines
    const descParagraphs = p.description
      ? p.description.split(/\n\s*\n/).filter(Boolean).map(d => `<p class="product-description">${esc(d.trim())}</p>`).join('')
      : '';

    page.innerHTML = `
      <div class="product-image-wrap">
        <img class="product-image" src="${esc(p.imageUrl)}" alt="${esc(p.name)}" />
      </div>
      <div class="product-info">
        <span class="script">crystal energy</span>
        <h1>${esc(p.name)}</h1>
        <div class="product-price-tag">CA$${p.price}</div>
        ${descParagraphs}
        <div class="product-details-list">
          <div class="product-detail-item">
            <div class="product-detail-icon">✦</div>
            <span>Ethically sourced & cleansed with intention</span>
          </div>
          <div class="product-detail-item">
            <div class="product-detail-icon">☽</div>
            <span>Charged under the full moon</span>
          </div>
          <div class="product-detail-item">
            <div class="product-detail-icon">🤍</div>
            <span>Handmade with love in Canada</span>
          </div>
        </div>
        <a href="/#crystals" class="back-btn">← Browse Collection</a>
      </div>`;

  } catch (err) {
    console.error('Failed to load product:', err);
    page.innerHTML = '<div class="loading-state"><p>Something went wrong</p></div>';
  }
}

loadProduct();
</script>

</body>
</html>
